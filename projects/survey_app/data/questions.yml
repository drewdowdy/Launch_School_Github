# List of Questions (an array of hashes)
---
- :title: 🥇 The Ultimate Brand
  :text: What is the name of your ultimate favorite ice cream brand?
  :name: brand
  :type: text
  :placeholder: eg. Baskin Robins
- :title: 🍴 Eating Style
  :text: What's your primary eating style?
  :name: eating_style
  :type: radio
  :options:
    - Waffle cone
    - Bowl
    - Straight from the tub
- :title: 🎊 Toppings
  :text: Which toppings are non-negotiable?
  :name: toppings
  :type: checkbox
  :options:
    - Sprinkles
    - Gummy bears
    - Hot fudge
    - Cookie dough
- :title: 🍨 Best Flavor
  :text: Which is the best flavor of ice cream?
  :name: flavor
  :type: dropdown
  :default_option: Choose a flavor
  :options:
    - Chocolate
    - Vanilla
    - Strawberry
    - Cookies and cream
- :title: 🪶 Ice Cream Poetry
  :text: "Write a poem about your best ice cream experience:"
  :name: poem
  :type: textarea
  :placeholder: "Roses are red, violets are blue..."